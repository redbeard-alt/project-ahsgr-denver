# format_rules.yml — AHSGR Denver roster normalization rules

roles:
  # Canonical role labels (lowercase, used as CSV values)
  board:
    - president
    - vice_president
    - secretary
    - treasurer
    - director
  officers:
    - newsletter_editor
    - marketing_director
    - member_committee_chair
    - webmaster

name_format: "Last, First"   # expected input format for normalization
date_format: "%Y-%m-%d"
